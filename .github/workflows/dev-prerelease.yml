name: Dev Prerelease

# Manual only - builds from the `dev` branch and publishes a prerelease
# straight away (no draft/manual-publish step) for beta-channel testers.
# See src/stores/updateStore.ts: the app already resolves the stable vs.
# beta update channel by filtering the GitHub releases list on `prerelease`,
# so nothing on the app side needs to change for this to be picked up.
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: dev-prerelease
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: rapture-apogee
    outputs:
      version: ${{ steps.package_version.outputs.version }}
      tag: ${{ steps.package_version.outputs.tag }}
      release_exists: ${{ steps.check_release.outputs.exists }}
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      - name: Compute dev version and tag
        id: package_version
        run: |
          BASE=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${BASE}-dev.${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if a release already exists for this tag
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.package_version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: check-version
    if: success() && needs.check-version.outputs.release_exists == 'false'
    runs-on: rapture-apogee
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    needs: check-version
    if: success() && needs.check-version.outputs.release_exists == 'false'
    runs-on: rapture-apogee
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

  prepare-release:
    needs: [check-version, lint, typecheck]
    if: success() && needs.check-version.outputs.release_exists == 'false'
    runs-on: rapture-apogee
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev

      - name: Create draft prerelease
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          gh release create "$TAG" --draft --prerelease \
            --title "Dev build $TAG" --notes "Automated dev build for testing. Not for general use." \
            --target "$(git rev-parse HEAD)" --repo "${{ github.repository }}"
          RELEASE_ID=$(TAG="$TAG" gh api --paginate "repos/${{ github.repository }}/releases" \
            --jq '.[] | select(.tag_name == env.TAG) | .id' | head -n1)
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: [check-version, prepare-release]
    if: success() && needs.check-version.outputs.release_exists == 'false'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            runner: rapture-apogee
          - platform: 'windows-latest'
            runner: windows-latest
          - platform: 'macos-latest'
            runner: macos-latest
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04' && runner.environment == 'github-hosted'
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm libfuse2 xdg-utils \
            pkg-config libglib2.0-bin libgtk-3-bin libgdk-pixbuf2.0-bin desktop-file-utils zsync

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Rust
        if: matrix.platform != 'ubuntu-22.04' || runner.environment == 'github-hosted'
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync Tauri/Cargo version to package.json
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          "
          VERSION="$VERSION" perl -i -pe 'BEGIN{$done=0} if (!$done && s/^version = ".*"/version = "$ENV{VERSION}"/) { $done=1 }' src-tauri/Cargo.toml

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          STELLAR_API_KEY: ${{ secrets.STELLAR_API_KEY }}
          LASTFM_SHARED_SECRET: ${{ secrets.LASTFM_SHARED_SECRET }}
        with:
          args: ${{ matrix.args }}
          # See the matching comment in release.yml - tagName is required
          # alongside releaseId or latest.json's download URLs fall back to
          # the generic releases/latest/download/<bundle> alias.
          tagName: ${{ needs.check-version.outputs.tag }}
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          releaseDraft: true
          prerelease: true

      - name: Validate packaged macOS application
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          APP_BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle/macos/Apogee.app"
          INFO_PLIST="$APP_BUNDLE/Contents/Info.plist"
          EXECUTABLE="$APP_BUNDLE/Contents/MacOS/Apogee"

          USAGE_DESCRIPTION=$(/usr/libexec/PlistBuddy -c 'Print :NSAudioCaptureUsageDescription' "$INFO_PLIST")
          test -n "$USAGE_DESCRIPTION"

          ARCHITECTURES=$(lipo -archs "$EXECUTABLE")
          case " $ARCHITECTURES " in *" arm64 "*) ;; *) echo "missing arm64 architecture: $ARCHITECTURES"; exit 1 ;; esac
          case " $ARCHITECTURES " in *" x86_64 "*) ;; *) echo "missing x86_64 architecture: $ARCHITECTURES"; exit 1 ;; esac

          STDOUT_LOG="$RUNNER_TEMP/apogee-smoke.stdout"
          STDERR_LOG="$RUNNER_TEMP/apogee-smoke.stderr"
          "$EXECUTABLE" >"$STDOUT_LOG" 2>"$STDERR_LOG" &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" 2>/dev/null || true
            wait "$APP_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          sleep 8
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            echo "Apogee exited during the macOS launch smoke test"
            cat "$STDOUT_LOG"
            cat "$STDERR_LOG"
            exit 1
          fi

      - name: Upload stable-named download aliases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.check-version.outputs.tag }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          fi
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            cp "$BUNDLE_DIR"/deb/*.deb Apogee_amd64.deb
            cp "$BUNDLE_DIR"/rpm/*.rpm Apogee-x86_64.rpm
            cp "$BUNDLE_DIR"/appimage/*.AppImage Apogee_amd64.AppImage
            gh release upload "$TAG" Apogee_amd64.deb Apogee-x86_64.rpm Apogee_amd64.AppImage --repo "${{ github.repository }}" --clobber
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            cp "$BUNDLE_DIR"/dmg/*.dmg Apogee_universal.dmg
            gh release upload "$TAG" Apogee_universal.dmg --repo "${{ github.repository }}" --clobber
          else
            cp "$BUNDLE_DIR"/nsis/*.exe Apogee_x64-setup.exe
            gh release upload "$TAG" Apogee_x64-setup.exe --repo "${{ github.repository }}" --clobber
          fi

  finalize:
    needs: [check-version, build]
    if: always() && needs.check-version.outputs.release_exists == 'false'
    runs-on: rapture-apogee
    permissions:
      contents: write
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev

      - name: Delete incomplete release on build failure
        if: needs.build.result != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          gh release delete "$TAG" --cleanup-tag --yes --repo "${{ github.repository }}" || true
          echo "::error::One or more platform builds failed; deleted incomplete dev prerelease $TAG"
          exit 1

      - name: Publish dev prerelease
        if: needs.build.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          gh release edit "$TAG" --draft=false --repo "${{ github.repository }}"
          echo "Published dev prerelease $TAG"
