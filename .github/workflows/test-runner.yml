name: Test Self-Hosted Runner

# Manual only - runs lint + typecheck on the rapture-apogee ARC runner set
# with no release/build side effects, for verifying the runner works.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    runs-on: rapture-apogee
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: rapture-apogee
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b
