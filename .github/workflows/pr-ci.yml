name: PR CI

# Runs on PRs targeting dev (nobody should be opening PRs against main
# directly - main only moves via push, see release.yml). Lint/typecheck
# always run; which runner they land on depends on who opened the PR:
# trusted actors (me, Dependabot) use the rapture-apogee self-hosted
# runner, everyone else gets a standard GitHub-hosted runner so random
# forks never get to execute code on our infra.
on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ${{ contains(fromJSON('["slamanna212", "dependabot[bot]"]'), github.actor) && 'rapture-apogee' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ${{ contains(fromJSON('["slamanna212", "dependabot[bot]"]'), github.actor) && 'rapture-apogee' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b
