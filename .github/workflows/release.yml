name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  check-version:
    runs-on: rapture-apogee
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    outputs:
      version: ${{ steps.package_version.outputs.version }}
      tag: ${{ steps.package_version.outputs.tag }}
      release_exists: ${{ steps.check_release.outputs.exists }}
      prerelease: ${{ steps.prerelease.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install GitHub CLI
        uses: ./.github/actions/setup-gh-cli

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Get package version
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if a release already exists for this tag
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.package_version.outputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine prerelease flag
        id: prerelease
        run: |
          VERSION="${{ steps.package_version.outputs.version }}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: check-version
    if: success() && needs.check-version.outputs.release_exists == 'false'
    runs-on: rapture-apogee
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    needs: check-version
    if: success() && needs.check-version.outputs.release_exists == 'false'
    runs-on: rapture-apogee
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

  prepare-release:
    needs: [check-version, lint, typecheck]
    if: success() && needs.check-version.outputs.release_exists == 'false'
    runs-on: rapture-apogee
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install GitHub CLI
        uses: ./.github/actions/setup-gh-cli

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          if [ "${{ needs.check-version.outputs.prerelease }}" = "true" ]; then
            gh release create "$TAG" --draft --prerelease \
              --title "Release $TAG" --notes "Full changelogs on GitHub." \
              --target "$(git rev-parse HEAD)" --repo "${{ github.repository }}"
          else
            gh release create "$TAG" --draft \
              --title "Release $TAG" --notes "Full changelogs on GitHub." \
              --target "$(git rev-parse HEAD)" --repo "${{ github.repository }}"
          fi
          RELEASE_ID=$(gh release view "$TAG" --repo "${{ github.repository }}" --json databaseId --jq .databaseId)
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: [check-version, prepare-release]
    if: success() && needs.check-version.outputs.release_exists == 'false'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            runner: rapture-apogee
          - platform: 'windows-latest'
            runner: windows-latest
          - platform: 'macos-latest'
            runner: macos-latest
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install GitHub CLI
        if: matrix.platform == 'ubuntu-22.04'
        uses: ./.github/actions/setup-gh-cli

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libxdo-dev libssl-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm libfuse2 xdg-utils \
            pkg-config libglib2.0-bin libgtk-3-bin libgdk-pixbuf2.0-bin desktop-file-utils zsync

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync Tauri/Cargo version to package.json
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          "
          VERSION="$VERSION" perl -i -pe 'BEGIN{$done=0} if (!$done && s/^version = ".*"/version = "$ENV{VERSION}"/) { $done=1 }' src-tauri/Cargo.toml

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          STELLAR_API_KEY: ${{ secrets.STELLAR_API_KEY }}
          LASTFM_SHARED_SECRET: ${{ secrets.LASTFM_SHARED_SECRET }}
        with:
          args: ${{ matrix.args }}
          # Both tagName and releaseId are required together: releaseId pins
          # which release to upload to (so none of the 3 platform jobs can
          # create a competing one - that release was already created once,
          # up front, by prepare-release), but tagName is still needed or
          # tauri-action falls back to generating latest.json download URLs
          # via the generic releases/latest/download/<bundle> alias instead
          # of this release's own tag - which would silently point every
          # release's updater manifest at whatever the newest release
          # happens to be later on.
          tagName: ${{ needs.check-version.outputs.tag }}
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          releaseDraft: true
          prerelease: ${{ needs.check-version.outputs.prerelease == 'true' }}

      - name: Upload stable-named download aliases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.check-version.outputs.tag }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          fi
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            cp "$BUNDLE_DIR"/deb/*.deb Apogee_amd64.deb
            cp "$BUNDLE_DIR"/rpm/*.rpm Apogee-x86_64.rpm
            cp "$BUNDLE_DIR"/appimage/*.AppImage Apogee_amd64.AppImage
            gh release upload "$TAG" Apogee_amd64.deb Apogee-x86_64.rpm Apogee_amd64.AppImage --repo "${{ github.repository }}" --clobber
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            cp "$BUNDLE_DIR"/dmg/*.dmg Apogee_universal.dmg
            gh release upload "$TAG" Apogee_universal.dmg --repo "${{ github.repository }}" --clobber
          else
            cp "$BUNDLE_DIR"/nsis/*.exe Apogee_x64-setup.exe
            gh release upload "$TAG" Apogee_x64-setup.exe --repo "${{ github.repository }}" --clobber
          fi

  finalize:
    needs: [check-version, build]
    if: always() && needs.check-version.outputs.release_exists == 'false'
    runs-on: rapture-apogee
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install GitHub CLI
        uses: ./.github/actions/setup-gh-cli

      - name: Delete incomplete release on build failure
        if: needs.build.result != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          gh release delete "$TAG" --cleanup-tag --yes --repo "${{ github.repository }}" || true
          echo "::error::One or more platform builds failed; deleted incomplete release $TAG"
          exit 1

      - name: Confirm release is ready for manual publish
        if: needs.build.result == 'success'
        run: |
          echo "All platform builds succeeded. ${{ needs.check-version.outputs.tag }} is a draft release - publish it from GitHub when ready."
