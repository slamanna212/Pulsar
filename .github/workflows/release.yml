name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    outputs:
      version: ${{ steps.package_version.outputs.version }}
      tag: ${{ steps.package_version.outputs.tag }}
      release_exists: ${{ steps.check_release.outputs.exists }}
      prerelease: ${{ steps.prerelease.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Get package version
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if a release already exists for this tag
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.package_version.outputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine prerelease flag
        id: prerelease
        run: |
          VERSION="${{ steps.package_version.outputs.version }}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.release_exists == 'false'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
          - platform: 'windows-latest'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync Tauri/Cargo version to package.json
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i "0,/^version = /s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.check-version.outputs.tag }}
          releaseName: 'Apogee ${{ needs.check-version.outputs.tag }}'
          releaseBody: 'See the assets below to download this version.'
          releaseDraft: true
          prerelease: ${{ needs.check-version.outputs.prerelease == 'true' }}

      - name: Upload stable-named download aliases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.check-version.outputs.tag }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          if [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            cp "$BUNDLE_DIR"/deb/*.deb Apogee_amd64.deb
            cp "$BUNDLE_DIR"/rpm/*.rpm Apogee-x86_64.rpm
            cp "$BUNDLE_DIR"/appimage/*.AppImage Apogee_amd64.AppImage
            gh release upload "$TAG" Apogee_amd64.deb Apogee-x86_64.rpm Apogee_amd64.AppImage --repo "${{ github.repository }}" --clobber
          else
            cp "$BUNDLE_DIR"/nsis/*.exe Apogee_x64-setup.exe
            gh release upload "$TAG" Apogee_x64-setup.exe --repo "${{ github.repository }}" --clobber
          fi
